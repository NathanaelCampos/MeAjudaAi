services:
  postgres:
    image: postgres:16
    container_name: meajudaai-postgres
    environment:
      POSTGRES_DB: meajudaai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: