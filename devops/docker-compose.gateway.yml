services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: meajudaai-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      PORT: 3000

  gateway:
    image: nginx:1.27-alpine
    container_name: meajudaai-gateway
    depends_on:
      - frontend
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/meajudaai.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
