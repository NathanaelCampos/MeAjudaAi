name: Frontend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - 'devops/docker-compose.frontend.yml'
      - 'deploy/frontend-deploy-checklist.md'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - 'devops/docker-compose.frontend.yml'
      - 'deploy/frontend-deploy-checklist.md'
  workflow_dispatch:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5231
        run: npm run build

      - name: Upload standalone bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone-bundle
          path: |
            frontend/.next/standalone
            frontend/.next/static
            frontend/public

  frontend-docker-smoke:
    runs-on: ubuntu-latest
    needs: frontend-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: frontend
        run: docker build -t meajudaai-frontend:ci .
