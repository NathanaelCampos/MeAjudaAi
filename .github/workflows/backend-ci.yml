name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MeAjudaAi.sln

      - name: Build
        run: dotnet build MeAjudaAi.sln --configuration Release --no-restore

      - name: Test
        env:
          ASPNETCORE_ENVIRONMENT: Testing
        run: dotnet test MeAjudaAi.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/TestResults/*.trx

  admin-jobs-tests:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run admin jobs integration tests
        working-directory: backend
        run: |
          chmod +x scripts/run-admin-jobs-tests.sh
          mkdir -p artifacts
          ./scripts/run-admin-jobs-tests.sh 2>&1 | tee artifacts/admin-jobs-tests.log

      - name: Upload admin jobs log
        uses: actions/upload-artifact@v4
        with:
          name: admin-jobs-tests-log
          path: backend/artifacts/admin-jobs-tests.log
